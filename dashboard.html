<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .top-navbar {
            width: 100%;
            max-width: 420px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-left-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-icon-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #fff;
        }

        .lang-dropdown-select {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 8px 12px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .menu-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .menu-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-modal-content {
            width: 90%;
            max-width: 380px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px 20px 35px 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-close-btn {
            background: transparent;
            border: none;
            color: #9ca3af;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .menu-links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }

        .menu-link-item {
            color: #d1d5db;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 10px;
        }

        .menu-link-item:hover {
            color: #38bdf8;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 22px;
            text-align: center;
        }

        .auth-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .auth-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            color: #ffffff;
        }

        .welcome-user {
            color: #38bdf8;
            font-weight: 600;
        }

        .auth-btn {
            background: #38bdf8;
            border: none;
            border-radius: 14px;
            padding: 14px;
            color: #0b0f19;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
        }

        .logout-btn {
            background: #ef4444;
            color: #fff;
        }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div class="nav-left-actions">
            <div class="menu-icon-btn" onclick="toggleMenu()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </div>
            <select class="lang-dropdown-select" id="langSelect">
                <option value="en" selected>English</option>
                <option value="ku">کوردی</option>
            </select>
        </div>
    </header>

    <div class="menu-modal-overlay" id="menuModal" onclick="closeMenuOnOutside(event)">
        <div class="menu-modal-content">
            <div class="menu-modal-header">
                <div class="menu-logo"></div>
                <button class="menu-close-btn" onclick="toggleMenu()">✕</button>
            </div>
            <div class="menu-links-list">
                <a href="https://www.instagram.com/callvin_studio?igsh=NXNwdzJraHJlOWt6&utm_source=qr" target="_blank" class="menu-link-item">Instagram</a>
                <a href="mailto:callvinstodio@gmail.com" class="menu-link-item">Email</a>
                <a href="#" class="menu-link-item">Premium</a>
            </div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Dashboard</h2>
            <p>Welcome back, <span class="welcome-user" id="displayUsername">User</span>!</p>
        </div>
        <div style="background: #1f2937; padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);">
            <p style="margin: 0; color: #d1d5db; font-size: 0.9rem;">You have successfully logged into your account management area.</p>
        </div>
        <button class="auth-btn logout-btn" onclick="handleLogout()">Logout</button>
    </div>

    <script>
        // پیشاندانی ناوی ئەو بەکارهێنەرەی کە لۆگینی کردووە
        window.onload = function() {
            const savedUser = localStorage.getItem('current_user');
            if (savedUser) {
                document.getElementById('displayUsername').innerText = savedUser;
            }
        };

        function toggleMenu() {
            document.getElementById('menuModal').classList.toggle('active');
        }

        function closeMenuOnOutside(event) {
            if (event.target === document.getElementById('menuModal')) {
                document.getElementById('menuModal').classList.remove('active');
            }
        }

        function handleLogout() {
            localStorage.removeItem('current_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
