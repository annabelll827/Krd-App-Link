<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .top-navbar {
            width: 100%;
            max-width: 440px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-left-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-icon-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #fff;
        }

        .lang-dropdown-select {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 8px 12px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        /* دوگمەی نوێی چوونە دەرەوە / گەڕانەوە لە باڕی سەرەوە */
        .top-logout-btn {
            background: #ef4444;
            border: none;
            border-radius: 16px;
            padding: 8px 14px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .top-logout-btn:hover {
            opacity: 0.9;
        }

        .menu-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .menu-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-modal-content {
            width: 90%;
            max-width: 380px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px 20px 35px 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-close-btn {
            background: transparent;
            border: none;
            color: #9ca3af;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .menu-links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }

        .menu-link-item {
            color: #d1d5db;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 10px;
        }

        .menu-link-item:hover {
            color: #38bdf8;
        }

        .dashboard-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dash-card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 22px 24px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s ease;
        }

        .dash-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
        }

        .card-label {
            font-size: 0.85rem;
            color: #9ca3af;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-value span.highlight {
            color: #38bdf8;
        }

        .card-action-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 8px 12px;
            color: #38bdf8;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .card-action-btn:hover {
            background: #374151;
        }

        .test-links-box {
            background: #111827;
            border: 1px dashed rgba(56, 189, 248, 0.3);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
        }

        .test-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px;
            color: #38bdf8;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .test-btn:hover {
            background: #374151;
        }
    </style>
</head>
<body>

    <!-- باڕی سەرەوە (ڕیزی زمان و دوگمەی چوونە دەرەوە) -->
    <header class="top-navbar">
        <div class="nav-left-actions">
            <div class="menu-icon-btn" onclick="toggleMenu()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </div>
            <select class="lang-dropdown-select" id="langSelect">
                <option value="en" selected>English</option>
                <option value="ku">کوردی</option>
            </select>
        </div>
        <div>
            <button class="top-logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <div class="menu-modal-overlay" id="menuModal" onclick="closeMenuOnOutside(event)">
        <div class="menu-modal-content">
            <div class="menu-modal-header">
                <div class="menu-logo"></div>
                <button class="menu-close-btn" onclick="toggleMenu()">✕</button>
            </div>
            <div class="menu-links-list">
                <a href="https://www.instagram.com/callvin_studio?igsh=NXNwdzJraHJlOWt6&utm_source=qr" target="_blank" class="menu-link-item">Instagram</a>
                <a href="mailto:callvinstodio@gmail.com" class="menu-link-item">Email</a>
                <a href="#" class="menu-link-item">Premium</a>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        
        <!-- 1. Your Profile -->
        <div class="dash-card">
            <span class="card-label">Your Profail</span>
            <div class="card-value">
                <span class="highlight" id="displayUsername">User</span>
                <button class="card-action-btn" onclick="editAccountName()">Edit</button>
            </div>
        </div>

        <!-- 2. Profile Views -->
        <div class="dash-card">
            <span class="card-label">Profile Views</span>
            <div class="card-value">
                <span id="profileViewsCount">0</span>
            </div>
        </div>

        <!-- 3. Link Clicks -->
        <div class="dash-card">
            <span class="card-label">Link Clicks</span>
            <div class="card-value">
                <span id="linkClicksCount">0</span>
            </div>
        </div>

        <!-- بەشی تاقیکردنەوەی سەردان و کلیکەکان -->
        <div class="test-links-box">
            <span style="font-size: 0.8rem; color: #9ca3af;">Testing / Simulation Tools</span>
            <button class="test-btn" onclick="simulateProfileVisit()">Simulate Profile Visit (+1 View)</button>
            <button class="test-btn" onclick="simulateExternalLinkClick()">Simulate Link Click (+1 Click)</button>
        </div>

    </div>

    <script>
        let currentUser = '';

        window.onload = function() {
            currentUser = localStorage.getItem('current_user') || 'User';
            document.getElementById('displayUsername').innerText = currentUser;

            updateDashboardStats();
        };

        function updateDashboardStats() {
            const viewsKey = `profile_views_${currentUser}`;
            const clicksKey = `link_clicks_${currentUser}`;

            const views = localStorage.getItem(viewsKey) || 0;
            const clicks = localStorage.getItem(clicksKey) || 0;

            document.getElementById('profileViewsCount').innerText = views;
            document.getElementById('linkClicksCount').innerText = clicks;
        }

        function toggleMenu() {
            document.getElementById('menuModal').classList.toggle('active');
        }

        function closeMenuOnOutside(event) {
            if (event.target === document.getElementById('menuModal')) {
                document.getElementById('menuModal').classList.remove('active');
            }
        }

        function editAccountName() {
            const currentName = currentUser;
            const newName = prompt("Enter new account name:", currentName);
            if (newName && newName.trim() !== "") {
                const trimmedName = newName.trim();
                
                const oldViews = localStorage.getItem(`profile_views_${currentName}`) || 0;
                const oldClicks = localStorage.getItem(`link_clicks_${currentName}`) || 0;

                localStorage.setItem(`profile_views_${trimmedName}`, oldViews);
                localStorage.setItem(`link_clicks_${trimmedName}`, oldClicks);

                localStorage.setItem('current_user', trimmedName);
                currentUser = trimmedName;
                document.getElementById('displayUsername').innerText = trimmedName;
            }
        }

        function simulateProfileVisit() {
            const viewsKey = `profile_views_${currentUser}`;
            let views = parseInt(localStorage.getItem(viewsKey) || 0) + 1;
            localStorage.setItem(viewsKey, views);
            document.getElementById('profileViewsCount').innerText = views;
            alert("A new user visited your profile! View count updated.");
        }

        function simulateExternalLinkClick() {
            const clicksKey = `link_clicks_${currentUser}`;
            let clicks = parseInt(localStorage.getItem(clicksKey) || 0) + 1;
            localStorage.setItem(clicksKey, clicks);
            document.getElementById('linkClicksCount').innerText = clicks;
            alert("Someone clicked your link! Click count updated.");
        }

        function handleLogout() {
            localStorage.removeItem('current_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
