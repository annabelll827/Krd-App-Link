<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Navbar Bar */
        .top-navbar {
            width: 100%;
            max-width: 420px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-left-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-icon-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #fff;
        }

        .lang-select-box {
            position: relative;
        }

        .lang-dropdown-select {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 8px 12px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .lang-dropdown-select option {
            background: #111827;
            color: #fff;
        }

        /* Modal Overlay for Menu */
        .menu-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .menu-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Menu Modal Box */
        .menu-modal-content {
            width: 90%;
            max-width: 380px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px 20px 35px 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .menu-modal-overlay.active .menu-modal-content {
            transform: scale(1);
        }

        .menu-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .menu-logo {
            display: flex;
            align-items: center;
        }

        .menu-logo svg {
            width: 32px;
            height: 32px;
        }

        .menu-close-btn {
            background: transparent;
            border: none;
            color: #9ca3af;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
            transition: color 0.2s;
        }

        .menu-close-btn:hover {
            color: #fff;
        }

        .menu-links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }

        .menu-link-item {
            color: #d1d5db;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 10px;
            transition: color 0.2s;
        }

        .menu-link-item:hover {
            color: #38bdf8;
        }

        /* Auth Container */
        .auth-container {
            width: 100%;
            max-width: 420px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .auth-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .auth-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            color: #ffffff;
        }

        .auth-header p {
            font-size: 0.85rem;
            color: #9ca3af;
            margin: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: #9ca3af;
            font-weight: 600;
        }

        .form-group input {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #38bdf8;
            background: #111827;
        }

        .auth-btn {
            background: #38bdf8;
            border: none;
            border-radius: 14px;
            padding: 14px;
            color: #0b0f19;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-top: 5px;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .auth-switch {
            text-align: center;
            font-size: 0.85rem;
            color: #9ca3af;
            margin-top: 5px;
        }

        .auth-switch span {
            color: #38bdf8;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .form-section {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .form-section.active {
            display: flex;
        }
    </style>
</head>
<body>

    <!-- Top Navbar Bar -->
    <header class="top-navbar">
        <div class="nav-left-actions">
            <div class="menu-icon-btn" onclick="toggleMenu()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </div>
            <div class="lang-select-box">
                <select class="lang-dropdown-select" id="langSelect" onchange="changeLanguage(this.value)">
                    <option value="en" selected>English</option>
                    <option value="ku">کوردی</option>
                </select>
            </div>
        </div>
        <div></div>
    </header>

    <!-- Side/Popup Menu Modal -->
    <div class="menu-modal-overlay" id="menuModal" onclick="closeMenuOnOutside(event)">
        <div class="menu-modal-content">
            <div class="menu-modal-header">
                <div class="menu-logo">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6H11V14L18 6H24L15 16L24 26H18L11 18V26H6V6Z" fill="url(#menu_paint0_linear)"/>
                        <path d="M18.5 13.5C19.3 12.7 19.3 11.3 18.5 10.5C17.7 9.7 16.3 9.7 15.5 10.5L13.5 12.5C12.7 13.3 12.7 14.7 13.5 15.5L14.5 16.5" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="menu_paint0_linear" x1="6" y1="6" x2="24" y2="26" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#a855f7"/>
                                <stop offset="1" stop-color="#6366f1"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <button class="menu-close-btn" onclick="toggleMenu()">✕</button>
            </div>

            <div class="menu-links-list">
                <a href="#" class="menu-link-item" id="menuInstagram">Instagram</a>
                <a href="#" class="menu-link-item" id="menuEmail">Email</a>
                <a href="#" class="menu-link-item" id="menuPremium">Premium</a>
            </div>
        </div>
    </div>

    <div class="auth-container">
        
        <!-- Login Form -->
        <div class="form-section active" id="loginSection">
            <div class="auth-header">
                <h2 id="loginTitle">Login</h2>
                <p id="loginSubtitle">Enter your username and password</p>
            </div>

            <div class="form-group">
                <label id="loginUserLabel">Username</label>
                <input type="text" id="loginUsername" placeholder="Username...">
            </div>

            <div class="form-group">
                <label id="loginPassLabel">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>

            <button class="auth-btn" id="loginBtn" onclick="handleLogin()">Login</button>

            <div class="auth-switch" id="loginSwitch">
                Don't have an account? <span onclick="switchForm('register')">Register</span>
            </div>
        </div>

        <!-- Register Form -->
        <div class="form-section" id="registerSection">
            <div class="auth-header">
                <h2 id="regTitle">Create Account</h2>
                <p id="regSubtitle">Enter your email and password to get started</p>
            </div>

            <div class="form-group">
                <label id="regEmailLabel">Email</label>
                <input type="email" id="regEmail" placeholder="example@domain.com">
            </div>

            <div class="form-group">
                <label id="regUserLabel">Username</label>
                <input type="text" id="regUsername" placeholder="Username...">
            </div>

            <div class="form-group">
                <label id="regPassLabel">Password</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>

            <button class="auth-btn" id="regBtn" onclick="handleRegister()">Register</button>

            <div class="auth-switch" id="regSwitch">
                Already have an account? <span onclick="switchForm('login')">Login</span>
            </div>
        </div>

    </div>

    <script>
        const translations = {
            ku: {
                menuInstagram: "ئینستاگرام",
                menuEmail: "ئیمەیڵ",
                menuPremium: "پریمۆم",

                loginTitle: "چوونە ژوورەوە",
                loginSubtitle: "ناوی بەکارهێنەر و وشەی تێپەڕ بنووسە",
                loginUserLabel: "ناوی بەکارهێنەر (Username)",
                loginUserPlaceholder: "ناوی بەکارهێنەر...",
                loginPassLabel: "وشەی تێپەڕ (Password)",
                loginPassPlaceholder: "••••••••",
                loginBtn: "چوونە ژوورەوە",
                loginSwitchText: "هەژمارت نییە؟",
                loginSwitchLink: "دروستکردنی ئەکاونت",
                
                regTitle: "دروستکردنی ئەکاونت",
                regSubtitle: "ئیمەیڵ و وشەی تێپەڕ بنووسە بۆ دەستپێکردن",
                regEmailLabel: "ئیمەیڵ (Email)",
                regEmailPlaceholder: "example@domain.com",
                regUserLabel: "ناوی بەکارهێنەر (Username)",
                regUserPlaceholder: "ناوی بەکارهێنەر...",
                regPassLabel: "وشەی تێپەڕ (Password)",
                regPassPlaceholder: "••••••••",
                regBtn: "تۆمارکردن",
                regSwitchText: "هەژمارت هەیە؟",
                regSwitchLink: "چوونە ژوورەوە"
            },
            en: {
                menuInstagram: "Instagram",
                menuEmail: "Email",
                menuPremium: "Premium",

                loginTitle: "Login",
                loginSubtitle: "Enter your username and password",
                loginUserLabel: "Username",
                loginUserPlaceholder: "Username...",
                loginPassLabel: "Password",
                loginPassPlaceholder: "••••••••",
                loginBtn: "Login",
                loginSwitchText: "Don't have an account?",
                loginSwitchLink: "Register",
                
                regTitle: "Create Account",
                regSubtitle: "Enter your email and password to get started",
                regEmailLabel: "Email",
                regEmailPlaceholder: "example@domain.com",
                regUserLabel: "Username",
                regUserPlaceholder: "Username...",
                regPassLabel: "Password",
                regPassPlaceholder: "••••••••",
                regBtn: "Register",
                regSwitchText: "Already have an account?",
                regSwitchLink: "Login"
            }
        };

        let currentLang = 'en';

        function toggleMenu() {
            const menuModal = document.getElementById('menuModal');
            menuModal.classList.toggle('active');
        }

        function closeMenuOnOutside(event) {
            const menuModal = document.getElementById('menuModal');
            if (event.target === menuModal) {
                menuModal.classList.remove('active');
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            const htmlRoot = document.getElementById('htmlRoot');

            if (lang === 'ku') {
                htmlRoot.setAttribute('dir', 'rtl');
                htmlRoot.setAttribute('lang', 'ku');
            } else {
                htmlRoot.setAttribute('dir', 'ltr');
                htmlRoot.setAttribute('lang', 'en');
            }

            // Menu texts
            document.getElementById('menuInstagram').innerText = t.menuInstagram;
            document.getElementById('menuEmail').innerText = t.menuEmail;
            document.getElementById('menuPremium').innerText = t.menuPremium;

            // Login texts & placeholders
            document.getElementById('loginTitle').innerText = t.loginTitle;
            document.getElementById('loginSubtitle').innerText = t.loginSubtitle;
            document.getElementById('loginUserLabel').innerText = t.loginUserLabel;
            document.getElementById('loginUsername').placeholder = t.loginUserPlaceholder;
            document.getElementById('loginPassLabel').innerText = t.loginPassLabel;
            document.getElementById('loginPassword').placeholder = t.loginPassPlaceholder;
            document.getElementById('loginBtn').innerText = t.loginBtn;
            document.getElementById('loginSwitch').innerHTML = `${t.loginSwitchText} <span onclick="switchForm('register')">${t.loginSwitchLink}</span>`;

            // Register texts & placeholders
            document.getElementById('regTitle').innerText = t.regTitle;
            document.getElementById('regSubtitle').innerText = t.regSubtitle;
            document.getElementById('regEmailLabel').innerText = t.regEmailLabel;
            document.getElementById('regEmail').placeholder = t.regEmailPlaceholder;
            document.getElementById('regUserLabel').innerText = t.regUserLabel;
            document.getElementById('regUsername').placeholder = t.regUserPlaceholder;
            document.getElementById('regPassLabel').innerText = t.regPassLabel;
            document.getElementById('regPassword').placeholder = t.regPassPlaceholder;
            document.getElementById('regBtn').innerText = t.regBtn;
            document.getElementById('regSwitch').innerHTML = `${t.regSwitchText} <span onclick="switchForm('login')">${t.regSwitchLink}</span>`;
        }

        function switchForm(type) {
            const loginSec = document.getElementById('loginSection');
            const registerSec = document.getElementById('registerSection');

            if (type === 'register') {
                loginSec.classList.remove('active');
                registerSec.classList.add('active');
            } else {
                registerSec.classList.remove('active');
                loginSec.classList.add('active');
            }
        }

        function handleRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (email && username && password) {
                localStorage.setItem('current_user', username);
                localStorage.setItem('user_pass_' + username, password);
                window.location.href = 'dashboard.html';
            } else {
                alert(currentLang === 'ku' ? 'تکایە هەموو خانەکان پڕبکەرەوە!' : 'Please fill in all fields!');
            }
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (username && password) {
                localStorage.setItem('current_user', username);
                window.location.href = 'dashboard.html';
            } else {
                alert(currentLang === 'ku' ? 'تکایە ناوی بەکارهێنەر و وشەی تێپەڕ بنووسە!' : 'Please enter username and password!');
            }
        }
    </script>
</body>
</html>
